# ===================================================================
# BookStorm Backend - Application Configuration
# ===================================================================

# Nap them application-local.properties (KHONG commit - da co trong .gitignore)
# de ghi de secret that (vd: MAIL_PASSWORD) ma khong dua len repo public
spring.config.import=optional:application-local.properties

# Server
server.port=8080

# ===================================================================
# Database Configuration (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bookstorm_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# JWT Configuration
# ===================================================================
jwt.secret=bookstorm-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# ===================================================================
# VNPay Configuration
# ===================================================================
vnpay.tmn-code=B77INC60
vnpay.hash-secret=NU3W61XPNAW4DDRSYM30E0G4GL97VG7M
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/v1/payments/vnpay/return

# ===================================================================
# File Upload Configuration
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

